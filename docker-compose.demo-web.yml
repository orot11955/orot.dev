services:
  demo-web:
    image: orot-web-demo:local
    build:
      context: .
      dockerfile: ./orot-web/Dockerfile
      args:
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-true}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://demo.orot.dev}
        NEXT_PUBLIC_CLIENT_ERROR_LOGGING: ${NEXT_PUBLIC_CLIENT_ERROR_LOGGING:-true}
        INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-http://127.0.0.1:9}
        WEB_IMAGE_REMOTE_PATTERNS: ${WEB_IMAGE_REMOTE_PATTERNS:-https://demo.orot.dev/**}
    restart: unless-stopped
    ports:
      - "${DEMO_WEB_PORT:-3001}:3000"
    environment:
      TZ: ${TZ:-Asia/Seoul}
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-true}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://demo.orot.dev}
      NEXT_PUBLIC_CLIENT_ERROR_LOGGING: ${NEXT_PUBLIC_CLIENT_ERROR_LOGGING:-true}
      CLIENT_ERROR_LOGGING: ${CLIENT_ERROR_LOGGING:-true}
      INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-http://127.0.0.1:9}
      WEB_IMAGE_REMOTE_PATTERNS: ${WEB_IMAGE_REMOTE_PATTERNS:-https://demo.orot.dev/**}
      SITE_URL: ${SITE_URL:-https://demo.orot.dev}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEB_LOG_LEVEL: ${WEB_LOG_LEVEL:-info}
      WEB_LOG_PRETTY: ${WEB_LOG_PRETTY:-}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      WEB_SERVER_API_TIMEOUT_MS: ${WEB_SERVER_API_TIMEOUT_MS:-3000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
