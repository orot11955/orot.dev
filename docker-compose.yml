x-orot-api-env: &orot-api-env
  TZ: ${TZ:-Asia/Seoul}
  NODE_ENV: production
  PORT: 4000
  DATABASE_URL: mysql://${DB_USERNAME:-orot}:${DB_PASSWORD:-orotpassword}@orot-db:3306/${DB_DATABASE:-orot}
  JWT_ACCESS_SECRET: ${API_JWT_ACCESS_SECRET:-changeme-access}
  JWT_REFRESH_SECRET: ${API_JWT_REFRESH_SECRET:-changeme-refresh}
  JWT_ACCESS_EXPIRES_IN: ${API_JWT_ACCESS_EXPIRES_IN:-15m}
  JWT_REFRESH_EXPIRES_IN: ${API_JWT_REFRESH_EXPIRES_IN:-30d}
  STUDIO_USERNAME: ${API_STUDIO_USERNAME:-admin}
  STUDIO_PASSWORD: ${API_STUDIO_PASSWORD:-changeme}
  WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost}
  SITE_URL: ${SITE_URL:-https://orot.dev}
  HTTP_LOGGING: ${API_HTTP_LOGGING:-false}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  API_LOG_LEVEL: ${API_LOG_LEVEL:-}
  LOG_PRETTY: ${LOG_PRETTY:-false}
  API_LOG_PRETTY: ${API_LOG_PRETTY:-}
  SLOW_QUERY_MS: ${API_SLOW_QUERY_MS:-300}
  REQUEST_BODY_LIMIT: ${API_REQUEST_BODY_LIMIT:-50mb}
  COOKIE_DOMAIN: ${API_COOKIE_DOMAIN:-}
  COOKIE_SECURE: ${API_COOKIE_SECURE:-false}
  DB_SEED_ON_DEPLOY: ${DB_SEED_ON_DEPLOY:-true}
  DB_AUTO_BASELINE_LEGACY: ${DB_AUTO_BASELINE_LEGACY:-true}

services:
  db:
    image: mariadb:10.11
    container_name: orot-db
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-orot}
      MYSQL_USER: ${DB_USERNAME:-orot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-orotpassword}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - orot-net

  orot-migrate:
    image: orot-api:local
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment: *orot-api-env
    command: ["/migration.sh"]
    networks:
      - orot-net
    profiles:
      - ops

  orot-api:
    image: orot-api:local
    build:
      context: .
      dockerfile: ./orot-api/Dockerfile
    container_name: orot-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment: *orot-api-env
    volumes:
      - api_uploads:/app/uploads
    networks:
      - orot-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  orot-web:
    image: orot-web:local
    build:
      context: .
      dockerfile: ./orot-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://orot.dev}
        NEXT_PUBLIC_CLIENT_ERROR_LOGGING: ${NEXT_PUBLIC_CLIENT_ERROR_LOGGING:-true}
        INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-http://orot-api:4000}
        WEB_IMAGE_REMOTE_PATTERNS: ${WEB_IMAGE_REMOTE_PATTERNS:-https://orot.dev/uploads/**}
    container_name: orot-web
    restart: unless-stopped
    depends_on:
      orot-api:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Seoul}
      NODE_ENV: production
      PORT: 3000
      SITE_URL: ${SITE_URL:-https://orot.dev}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://orot.dev}
      NEXT_PUBLIC_CLIENT_ERROR_LOGGING: ${NEXT_PUBLIC_CLIENT_ERROR_LOGGING:-true}
      CLIENT_ERROR_LOGGING: ${CLIENT_ERROR_LOGGING:-true}
      INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-http://orot-api:4000}
      WEB_IMAGE_REMOTE_PATTERNS: ${WEB_IMAGE_REMOTE_PATTERNS:-https://orot.dev/uploads/**}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEB_LOG_LEVEL: ${WEB_LOG_LEVEL:-info}
      WEB_LOG_PRETTY: ${WEB_LOG_PRETTY:-}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      WEB_SERVER_API_TIMEOUT_MS: ${WEB_SERVER_API_TIMEOUT_MS:-3000}
    networks:
      - orot-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.25-alpine
    container_name: orot-nginx
    restart: unless-stopped
    depends_on:
      orot-api:
        condition: service_healthy
      orot-web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      # Uncomment for TLS:
      # - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for TLS certificates:
      # - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - orot-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  db_data:
  api_uploads:

networks:
  orot-net:
    driver: bridge
