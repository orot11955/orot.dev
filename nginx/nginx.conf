worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  log_format orot_json escape=json
    '{'
      '"timestamp":"$time_iso8601",'
      '"requestId":"$request_id",'
      '"remoteAddr":"$remote_addr",'
      '"host":"$host",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"requestTime":$request_time,'
      '"upstreamAddr":"$upstream_addr",'
      '"upstreamStatus":"$upstream_status",'
      '"upstreamResponseTime":"$upstream_response_time",'
      '"referer":"$http_referer",'
      '"userAgent":"$http_user_agent"'
    '}';
  access_log /dev/stdout orot_json;
  error_log /dev/stderr warn;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript image/svg+xml;

  # Client body size (for uploads)
  client_max_body_size 20M;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ── Upstream services ─────────────────────────────────────────────
  upstream orot_api {
    server orot-api:4000;
  }

  upstream orot_web {
    server orot-web:3000;
  }

  # ── HTTP → HTTPS redirect (uncomment for production TLS) ─────────
  # server {
  #   listen 80;
  #   server_name orot.dev www.orot.dev;
  #   return 301 https://$host$request_uri;
  # }

  server {
    listen 80;
    server_name _;
    add_header X-Request-Id $request_id always;

    # ── Root sitemap proxy ────────────────────────────────────────
    location = /sitemap.xml {
      proxy_pass         http://orot_api/api/sitemap.xml;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-Id      $request_id;
      proxy_read_timeout 60s;
    }

    # ── Large gallery uploads ────────────────────────────────────
    location ^~ /api/studio/gallery {
      # Gallery uploads allow up to 20 files at 20MB each, so the
      # reverse proxy must allow a larger multipart body than the
      # default 20MB request cap.
      client_max_body_size 450M;
      proxy_pass         http://orot_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-Id      $request_id;
      proxy_read_timeout 60s;
    }

    # ── API proxy ─────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://orot_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-Id      $request_id;
      proxy_read_timeout 60s;
    }

    # ── Static uploads served by API ─────────────────────────────
    location /uploads/ {
      proxy_pass         http://orot_api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Request-Id $request_id;
      expires            7d;
      add_header         Cache-Control "public, immutable";
    }

    # ── Next.js frontend ─────────────────────────────────────────
    location / {
      proxy_pass         http://orot_web;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-Id      $request_id;
      proxy_read_timeout 60s;
    }

    # ── Health check ─────────────────────────────────────────────
    location /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }

  # ── TLS server (production — requires cert files) ────────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name orot.dev;
  #
  #   ssl_certificate     /etc/nginx/certs/orot.dev.crt;
  #   ssl_certificate_key /etc/nginx/certs/orot.dev.key;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #
  #   location /api/ { ... same as above ... }
  #   location / { ... same as above ... }
  # }
}
